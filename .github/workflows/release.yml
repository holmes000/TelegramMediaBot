name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - rid: win-x64
            os: ubuntu-latest
            artifact: TelegramMediaBot-win-x64
          - rid: linux-x64
            os: ubuntu-latest
            artifact: TelegramMediaBot-linux-x64
          - rid: linux-arm64
            os: ubuntu-latest
            artifact: TelegramMediaBot-linux-arm64

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Publish
        run: |
          dotnet publish -c Release \
            -r ${{ matrix.rid }} \
            --self-contained true \
            -p:PublishSingleFile=true \
            -p:IncludeNativeLibrariesForSelfExtract=true \
            -o publish/

      - name: Include scripts
        run: |
          if [ ! -f publish/scripts/ig_media.py ]; then
            cp -r scripts/ publish/scripts/
          fi

      - name: Include config files
        run: |
          cp appsettings.json publish/
          cp .env.example publish/
          cp docker-compose.yml publish/
          cp Dockerfile publish/
          mkdir -p publish/cookies publish/data/temp publish/tools_bin

      - name: Package
        run: |
          cd publish
          if [[ "${{ matrix.rid }}" == win-* ]]; then
            zip -r ../${{ matrix.artifact }}.zip .
          else
            tar czf ../${{ matrix.artifact }}.tar.gz .
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}.*

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: artifacts/*
