name: Deploy to AWS

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
      INSTAGRAM_COOKIES_B64: ${{ secrets.INSTAGRAM_COOKIES_B64 }}
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          envs: BOT_TOKEN,INSTAGRAM_COOKIES_B64
          script: |
            set -e
            REPO_DIR="$HOME/TelegramMediaBot"

            echo "DEBUG: INSTAGRAM_COOKIES_B64 length = ${#INSTAGRAM_COOKIES_B64}"

            # ── First-time setup (idempotent) ─────────────────────

            if ! command -v docker &> /dev/null; then
              echo "📦 Installing Docker..."
              sudo apt-get update -qq
              sudo apt-get install -y -qq docker.io docker-compose-v2 git
              sudo usermod -aG docker $USER
              sudo systemctl enable docker
              sudo systemctl start docker
              echo "✅ Docker installed"
            fi

            if [ ! -d "$REPO_DIR" ]; then
              echo "📥 Cloning repo..."
              git clone https://github.com/${{ github.repository }}.git "$REPO_DIR"
              echo "✅ Repo cloned"
            fi

            cd "$REPO_DIR"
            mkdir -p cookies data/temp

            # ── Update code ───────────────────────────────────────

            git fetch origin master
            git reset --hard origin/master

            # ── Write cookies from base64 and extract sessionid ───

            SESSION_ID=""
            if [ -n "$INSTAGRAM_COOKIES_B64" ]; then
              printf '%s' "$INSTAGRAM_COOKIES_B64" | base64 -d | sudo tee cookies/instagram_cookies.txt > /dev/null
              sudo chmod 644 cookies/instagram_cookies.txt

              LINES=$(wc -l < cookies/instagram_cookies.txt)
              echo "✅ Cookies written ($LINES lines)"

              SESSION_ID=$(awk -F'\t' '$6 == "sessionid" {print $7}' cookies/instagram_cookies.txt | tr -d '\r' | head -1)

              if [ -n "$SESSION_ID" ]; then
                echo "✅ Sessionid extracted (${#SESSION_ID} chars)"
              else
                echo "⚠️  Sessionid not found in cookies file"
              fi
            else
              echo "⚠️  INSTAGRAM_COOKIES_B64 is empty — no cookies written"
            fi

            # ── Write .env ────────────────────────────────────────

            printf 'BOT_TOKEN=%s\nINSTAGRAM_SESSION_ID=%s\n' "$BOT_TOKEN" "$SESSION_ID" | sudo tee .env > /dev/null
            sudo chmod 644 .env

            # ── Build and deploy ──────────────────────────────────

            if groups | grep -q docker; then
              DOCKER="docker"
            else
              DOCKER="sudo docker"
            fi

            $DOCKER compose up --build -d --force-recreate
            $DOCKER image prune -f

            echo ""
            echo "✅ Deployed at $(date)"
            echo "📋 Container status:"
            $DOCKER compose ps
