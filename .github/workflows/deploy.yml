name: Deploy to AWS

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          envs: BOT_TOKEN,INSTAGRAM_SESSION_ID,INSTAGRAM_COOKIES
          script: |
            cd ~/TelegramMediaBot
            git pull origin main

            # Write secrets to .env
            cat > .env << EOF
            BOT_TOKEN=${{ secrets.BOT_TOKEN }}
            INSTAGRAM_SESSION_ID=${{ secrets.INSTAGRAM_SESSION_ID }}
            EOF

            # Write cookies file if secret is set
            if [ -n "${{ secrets.INSTAGRAM_COOKIES }}" ]; then
              echo '${{ secrets.INSTAGRAM_COOKIES }}' > cookies/instagram_cookies.txt
            fi

            docker compose up --build -d --force-recreate
            docker image prune -f
            echo "✅ Deployed at $(date)"
