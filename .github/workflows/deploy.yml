name: Deploy to AWS

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          envs: BOT_TOKEN,INSTAGRAM_SESSION_ID,INSTAGRAM_COOKIES
          script: |
            set -e
            REPO_DIR="$HOME/TelegramMediaBot"

            # ── First-time setup (idempotent) ─────────────────────

            if ! command -v docker &> /dev/null; then
              echo "📦 Installing Docker..."
              sudo apt-get update -qq
              sudo apt-get install -y -qq docker.io docker-compose-v2 git
              sudo usermod -aG docker $USER
              sudo systemctl enable docker
              sudo systemctl start docker
              echo "✅ Docker installed"
            fi

            if [ ! -d "$REPO_DIR" ]; then
              echo "📥 Cloning repo..."
              git clone https://github.com/${{ github.repository }}.git "$REPO_DIR"
              echo "✅ Repo cloned"
            fi

            cd "$REPO_DIR"
            mkdir -p cookies data/temp

            # ── Update code ───────────────────────────────────────

            git fetch origin master
            git reset --hard origin/master

            # ── Write secrets from env vars (never in script text) ─

            printf 'BOT_TOKEN=%s\nINSTAGRAM_SESSION_ID=%s\n' "$BOT_TOKEN" "$INSTAGRAM_SESSION_ID" | sudo tee .env > /dev/null
            sudo chmod 644 .env

            if [ -n "$INSTAGRAM_COOKIES" ]; then
              printf '%s' "$INSTAGRAM_COOKIES" | sudo tee cookies/instagram_cookies.txt > /dev/null
              sudo chmod 644 cookies/instagram_cookies.txt
            fi

            # ── Build and deploy ──────────────────────────────────

            if groups | grep -q docker; then
              DOCKER="docker"
            else
              DOCKER="sudo docker"
            fi

            $DOCKER compose up --build -d --force-recreate
            $DOCKER image prune -f

            echo ""
            echo "✅ Deployed at $(date)"
            echo "📋 Container status:"
            $DOCKER compose ps
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          INSTAGRAM_SESSION_ID: ${{ secrets.INSTAGRAM_SESSION_ID }}
          INSTAGRAM_COOKIES: ${{ secrets.INSTAGRAM_COOKIES }}
